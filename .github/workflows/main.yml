name: CI Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip --upgrade "pip<24.1"
        pip install -r requirements.txt
        pip install dvc dvclive

    - name: Download dataset
      run: |
        mkdir -p credit_card_fraud_detection/data/raw
        wget https://storage.googleapis.com/download.tensorflow.org/data/creditcard.csv \
        -O credit_card_fraud_detection/data/raw/creditcard.csv

    - name: Run DVC Pipeline
      run: |
        dvc repro
