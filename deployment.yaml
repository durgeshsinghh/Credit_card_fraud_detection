apiVersion: apps/v1
kind: Deployment
metadata:
  name: creditcard
spec:
  replicas: 3
  selector:
    matchLabels:
      app: creditcard
  template:
    metadata:
      labels:
        app: creditcard
    spec:
      containers:
      - name: creditcard
        image: creditcard:v1
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        ports:
        - containerPort: 8080


--- 
apiVersion: v1
kind: Service
metadata:
  name: creditcard
spec:
  type: NodePort
  selector:
    app: creditcard
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30007
